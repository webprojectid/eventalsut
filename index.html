<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binus Alsut Event Logistics</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { dark: '#1a1625', card: '#251b33', primary: '#360568', secondary: '#5B2A86', muted: '#7785AC', teal: '#9AC6C5', mint: '#A5E6BA', danger: '#7f1d1d' } }, fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'], } } } }
    </script>
    <style>
        body { background-color: theme('colors.brand.dark'); color: #f3f4f6; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: theme('colors.brand.dark'); }
        ::-webkit-scrollbar-thumb { background: theme('colors.brand.secondary'); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: theme('colors.brand.muted'); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased">
    <div id="login-page" class="fixed inset-0 z-50 flex items-center justify-center bg-[#160d22] px-4">
        <div class="relative w-full max-w-md p-8 rounded-2xl bg-brand-card border border-brand-secondary/40 shadow-2xl">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-brand-primary border-2 border-brand-secondary text-brand-mint text-3xl font-extrabold mb-4">B</div>
                <h1 class="text-2xl font-bold text-white">Logistics Tracker</h1>
            </div>
            <form id="login-form" onsubmit="handleLogin(event)" class="space-y-5">
                <div id="login-error" class="hidden bg-red-900/50 border border-red-500 text-red-200 text-xs p-3 rounded-lg text-center font-semibold">Username/Password salah!</div>
                <div><label class="block text-xs font-bold text-brand-muted uppercase mb-2">Username</label><input type="text" id="username" required class="w-full px-4 py-3 rounded-xl bg-[#160d22] border border-brand-secondary/60 text-white"></div>
                <div><label class="block text-xs font-bold text-brand-muted uppercase mb-2">Password</label><input type="password" id="password" required class="w-full px-4 py-3 rounded-xl bg-[#160d22] border border-brand-secondary/60 text-white"></div>
                <button type="submit" class="w-full py-3.5 mt-2 rounded-xl bg-brand-secondary hover:bg-brand-primary text-white font-bold">Masuk Sistem</button>
            </form>
        </div>
    </div>

    <div id="main-app" class="hidden flex-1 h-screen flex flex-col md:flex-row overflow-hidden">
        <nav id="sidebar" class="fixed md:static inset-y-0 left-0 w-64 bg-brand-card border-r border-brand-secondary/40 transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-30 flex flex-col">
            <div class="p-5 border-b border-brand-secondary/20 bg-brand-primary/10">
                <p class="text-sm font-bold text-white" id="user-display-name"></p>
                <p class="text-xs font-semibold" id="user-role-badge"></p>
            </div>
            <div class="flex-1 overflow-y-auto py-4">
                <ul class="space-y-1 px-3">
                    <li><button onclick="navigate('dashboard')" id="nav-dashboard" class="w-full flex items-center px-4 py-3 rounded-xl text-sm font-bold bg-brand-secondary/30 text-white"><span class="mr-3">📊</span> Dashboard</button></li>
                    <li><button onclick="navigate('database')" id="nav-database" class="w-full flex items-center px-4 py-3 rounded-xl text-sm font-bold text-brand-muted"><span class="mr-3">🗄️</span> Form & Data</button></li>
                    <li><button onclick="navigate('active-loans')" id="nav-active-loans" class="w-full flex items-center px-4 py-3 rounded-xl text-sm font-bold text-brand-muted"><span class="mr-3">⚡</span> Tiket Aktif</button></li>
                    <li><button onclick="navigate('tools')" id="nav-tools" class="w-full flex items-center px-4 py-3 rounded-xl text-sm font-bold text-brand-muted"><span class="mr-3">🔍</span> Cari & Export</button></li>
                    <li><button onclick="forceSyncCloud()" class="w-full flex items-center px-4 py-3 rounded-xl text-sm font-bold text-brand-mint border border-brand-mint/30"><span class="mr-3">🔄</span> Sync Cloud</button></li>
                </ul>
            </div>
            <div class="p-4 border-t border-brand-secondary/40"><button onclick="handleLogout()" class="w-full py-2.5 rounded-lg bg-red-900/40 text-red-200 text-sm font-bold">Sign Out</button></div>
        </nav>

        <main class="flex-1 bg-brand-dark overflow-y-auto p-8">
            <div id="view-dashboard" class="fade-in space-y-6">
                <h2 class="text-3xl font-extrabold text-white">Dashboard</h2>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                    <div class="bg-brand-card p-5 rounded-2xl border"><p class="text-xs text-brand-muted uppercase">Total Peminjaman</p><p class="text-3xl font-extrabold" id="dash-total-loans">0</p></div>
                    <div class="bg-brand-card p-5 rounded-2xl border"><p class="text-xs text-brand-muted uppercase">Active</p><p class="text-3xl font-extrabold text-brand-teal" id="dash-active-loans">0</p></div>
                </div>
            </div>
            <div id="view-database" class="hidden fade-in h-full">
                <h2 class="text-3xl font-extrabold text-white mb-6">Database</h2>
                <div class="flex-1 overflow-auto bg-brand-card rounded-2xl p-4">
                    <table class="w-full text-left">
                        <thead class="text-[11px] uppercase text-brand-muted"><tr><th class="py-3">Tgl</th><th class="py-3">Ticket</th><th class="py-3">Event</th><th class="py-3">Status</th></tr></thead>
                        <tbody id="loan-table-body" class="text-sm"></tbody>
                    </table>
                </div>
            </div>
            <div id="view-active-loans" class="hidden fade-in space-y-6"></div>
            <div id="view-tools" class="hidden fade-in space-y-6"></div>
        </main>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyexEalqwPhlS5bhnx1Tco4FbTCbiGa5lDLCyMrro7lyNKRDS6VWbhrhFmzQ1MfygGFHQ/exec';
        let trackingRecords = JSON.parse(localStorage.getItem('binus_alsut_records')) || [];
        
        function forceSyncCloud() {
            alert("Sedang menyinkronkan data...");
            fetch(API_URL)
                .then(res => res.json())
                .then(data => {
                    trackingRecords = data;
                    localStorage.setItem('binus_alsut_records', JSON.stringify(data));
                    alert("Sync sukses!");
                    window.location.reload();
                })
                .catch(err => {
                    console.error(err);
                    alert("Gagal koneksi ke API Cloud.");
                });
        }
        
        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            if(u === 'sewong' && p === '_pR0t3<s3<uR3') {
                localStorage.setItem('binus_current_session', JSON.stringify({role: 'admin', username: 'sewong'}));
                location.reload();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }
        
        function handleLogout() {
            localStorage.removeItem('binus_current_session');
            location.reload();
        }

        function navigate(viewId) {
            ['dashboard', 'database', 'active-loans', 'tools'].forEach(id => {
                document.getElementById('view-' + id).classList.add(id === viewId ? 'block' : 'hidden');
                document.getElementById('view-' + id).classList.remove(id === viewId ? 'hidden' : 'block');
            });
        }
        
        window.onload = () => {
            const session = localStorage.getItem('binus_current_session');
            if(session) {
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-display-name').innerText = JSON.parse(session).username;
            }
        };
    </script>
</body>
</html>
